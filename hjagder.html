<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodina RP Market | Торговая Площадка</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-red: #e61e1e;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --vip-gold: #ffcc00;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            overflow-x: hidden;
        }

        /* Шапка */
        header {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://rodina-rp.com/img/bg.jpg');
            background-size: cover;
            background-position: center;
            padding: 60px 20px;
            text-align: center;
            border-bottom: 4px solid var(--main-red);
        }

        .logo { font-size: 3rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .logo span { color: var(--main-red); }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Панель пользователя */
        .user-panel {
            display: flex;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 10px;
            margin-top: -40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-red { background: var(--main-red); color: white; }
        .btn-red:hover { transform: scale(1.05); }
        .btn-gold { background: var(--vip-gold); color: black; }

        /* Вкладки */
        .tabs { display: flex; gap: 10px; margin: 30px 0; }
        .tab { 
            flex: 1; padding: 15px; text-align: center; 
            background: var(--card-bg); cursor: pointer; border-radius: 8px;
            font-weight: bold; font-size: 1.1rem;
        }
        .tab.active { background: var(--main-red); }

        /* Фильтры */
        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        select, input {
            background: #252525;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 5px;
            outline: none;
        }

        /* Карточки товаров */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .card.vip { border-color: var(--vip-gold); box-shadow: 0 0 20px rgba(255, 204, 0, 0.2); }
        .vip-badge { position: absolute; top: 10px; right: 10px; background: var(--vip-gold); color: black; padding: 4px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; z-index: 5; }

        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 15px; }
        .server-tag { background: #333; padding: 3px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; }
        .price { font-size: 1.5rem; font-weight: 900; color: #00ff73; margin: 10px 0; }

        /* Модалки */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a1a1a; padding: 30px; border-radius: 15px;
            z-index: 1000; width: 90%; max-width: 500px; box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index: 999; }

        /* Админка */
        .admin-controls { margin-top: 10px; display: flex; gap: 5px; }
        .user-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<header id="mainHeader">
    <p class="logo">Rodina <span>Market</span></p>
    <p>Центральный рынок всех серверов</p>
</header>

<div class="container">
    <div class="user-panel">
        <div id="userInfo">Вход не выполнен</div>
        <div id="authBtns">
            <button class="btn btn-red" onclick="openModal('regModal')">Регистрация</button>
            <button class="btn" onclick="openModal('loginModal')">Войти</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-sale" onclick="setMode('sale')">🛒 ПРОДАЖА</div>
        <div class="tab" id="tab-rent" onclick="setMode('rent')">🔑 АРЕНДА (час)</div>
    </div>

    <div class="filters">
        <input type="text" id="searchInput" placeholder="Поиск (например: Кирка)..." oninput="renderItems()">
        <select id="serverFilter" onchange="renderItems()">
            <option value="all">Все серверы</option>
            <option>Центральный</option><option>Южный</option><option>Северный</option>
            <option>Восточный</option><option>Западный</option><option>Приморский</option><option>Федеральный</option>
        </select>
        <select id="catFilter" onchange="renderItems()">
            <option value="all">Все категории</option>
            <option>Аксессуары</option><option>Скины</option><option>Машины</option><option>Дома</option><option>Квартиры</option>
        </select>
        <button class="btn btn-red" onclick="checkAuthAndAdd()">+ ВЫСТАВИТЬ</button>
        <button class="btn btn-gold" id="adminBtn" style="display:none" onclick="openModal('adminModal')">АДМИН</button>
    </div>

    <div class="market-grid" id="marketGrid"></div>
</div>

<!-- Модалки -->
<div class="overlay" onclick="closeModals()"></div>

<!-- Регистрация -->
<div class="modal" id="regModal">
    <h2>Создать аккаунт</h2>
    <input type="text" id="regUser" placeholder="Логин" style="width:100%; margin-bottom:10px;">
    <input type="password" id="regPass" placeholder="Пароль" style="width:100%; margin-bottom:20px;">
    <button class="btn btn-red" style="width:100%" onclick="app.register()">Зарегистрироваться</button>
</div>

<!-- Вход -->
<div class="modal" id="loginModal">
    <h2>Вход</h2>
    <input type="text" id="logUser" placeholder="Логин" style="width:100%; margin-bottom:10px;">
    <input type="password" id="logPass" placeholder="Пароль" style="width:100%; margin-bottom:20px;">
    <button class="btn btn-red" style="width:100%" onclick="app.login()">Войти</button>
</div>

<!-- Добавление товара -->
<div class="modal" id="addModal">
    <h2>Выставить товар</h2>
    <input type="text" id="pTitle" placeholder="Название (например: Роллеры +12)" style="width:100%; margin-bottom:10px;">
    <select id="pServer" style="width:100%; margin-bottom:10px;">
        <option>Центральный</option><option>Южный</option><option>Северный</option>
        <option>Восточный</option><option>Западный</option><option>Приморский</option><option>Федеральный</option>
    </select>
    <select id="pCat" style="width:100%; margin-bottom:10px;">
        <option>Аксессуары</option><option>Скины</option><option>Машины</option><option>Дома</option><option>Квартиры</option>
    </select>
    <input type="number" id="pPrice" placeholder="Цена в рублях" style="width:100%; margin-bottom:10px;">
    <input type="text" id="pImg" placeholder="Ссылка на фото предмета" style="width:100%; margin-bottom:10px;">
    <input type="text" id="pTg" placeholder="Твой Telegram (Username)" style="width:100%; margin-bottom:20px;">
    <button class="btn btn-red" style="width:100%" onclick="app.postItem()">Опубликовать на 24ч</button>
</div>

<!-- Админ Панель -->
<div class="modal" id="adminModal" style="max-width: 600px;">
    <h2>Админ-центр</h2>
    <div style="border-bottom: 1px solid #333; padding-bottom:10px; margin-bottom:10px;">
        <h4>Настройка баннера</h4>
        <input type="text" id="bannerUrl" placeholder="Ссылка на фоновое фото" style="width:70%">
        <button class="btn" onclick="app.changeBanner()">OK</button>
    </div>
    <div id="usersList">
        <h4>Пользователи</h4>
        <!-- Список юзеров -->
    </div>
</div>

<script>
    // База данных в браузере
    let state = {
        users: JSON.parse(localStorage.getItem('rodina_users')) || [
            {u: 'admin', p: 'admin', role: 'admin', banned: false}
        ],
        items: JSON.parse(localStorage.getItem('rodina_items')) || [],
        currentUser: null,
        mode: 'sale'
    };

    const app = {
        save() {
            localStorage.setItem('rodina_users', JSON.stringify(state.users));
            localStorage.setItem('rodina_items', JSON.stringify(state.items));
        },

        register() {
            const u = document.getElementById('regUser').value;
            const p = document.getElementById('regPass').value;
            if(!u || !p) return alert('Заполни поля!');
            if(state.users.find(x => x.u === u)) return alert('Юзер уже есть!');
            state.users.push({u, p, role: 'user', banned: false});
            this.save();
            alert('Успех! Теперь войдите.');
            closeModals();
        },

        login() {
            const u = document.getElementById('logUser').value;
            const p = document.getElementById('logPass').value;
            const user = state.users.find(x => x.u === u && x.p === p);
            if(user) {
                if(user.banned) return alert('Вы заблокированы!');

                document.getElementById('userInfo').innerHTML = XXXINLINECODEXXX3XXXINLINECODEXXX;
                document.getElementById('authBtns').innerHTML = XXXINLINECODEXXX4XXXINLINECODEXXX;
                if(user.role === 'admin') document.getElementById('adminBtn').style.display = 'inline-block';
                closeModals();
                renderItems();
            } else alert('Неверно!');
        },

        postItem() {
            const item = {
                id: Date.now(),
                owner: state.currentUser.u,
                title: document.getElementById('pTitle').value,
                server: document.getElementById('pServer').value,
                cat: document.getElementById('pCat').value,
                price: document.getElementById('pPrice').value,
                img: document.getElementById('pImg').value || 'https://via.placeholder.com/300x200?text=RODINA+RP',
                tg: document.getElementById('pTg').value.replace('@',''),
                type: state.mode,
                isVip: false,
                date: Date.now()
            };
            state.items.push(item);
            this.save();
            closeModals();
            renderItems();
        },

        deleteItem(id) {
            state.items = state.items.filter(i => i.id !== id);
            this.save();
            renderItems();
        },

        toggleVip(id) {
            const item = state.items.find(i => i.id === id);
            item.isVip = !item.isVip;
            this.save();
            renderItems();
        },

        ban(u) {
            if(u === 'admin') return;
            const user = state.users.find(x => x.u === u);
            user.banned = !user.banned;
            this.save();
            renderAdminUsers();
        },

        promote(u) {
            const user = state.users.find(x => x.u === u);
            user.role = 'admin';
            this.save();
            renderAdminUsers();
        },

        changeBanner() {
            const url = document.getElementById('bannerUrl').value;
            document.getElementById('mainHeader').style.backgroundImage = XXXINLINECODEXXX5XXXINLINECODEXXX;
        }
    };

    function setMode(m) {
        state.mode = m;
        document.getElementById('tab-sale').classList.toggle('active', m === 'sale');
        document.getElementById('tab-rent').classList.toggle('active', m === 'rent');
        renderItems();
    }

    function renderItems() {
        const grid = document.getElementById('marketGrid');
        grid.innerHTML = '';
        
        const search = document.getElementById('searchInput').value.toLowerCase();
        const server = document.getElementById('serverFilter').value;
        const cat = document.getElementById('catFilter').value;

        // Удаление старых (24 часа)
        const now = Date.now();
        state.items = state.items.filter(i => (now - i.date) < 24 * 60 * 60 * 1000);

        // Сортировка (VIP выше)
        let filtered = state.items.filter(i => i.type === state.mode);
        filtered.sort((a, b) => b.isVip - a.isVip);

        filtered.forEach(i => {
            if(server !== 'all' && i.server !== server) return;
            if(cat !== 'all' && i.cat !== cat) return;
            if(!i.title.toLowerCase().includes(search)) return;

            const isAdmin = state.currentUser?.role === 'admin';
            const isOwner = state.currentUser?.u === i.owner;

            grid.innerHTML += `
                <div class="card ${i.isVip ? 'vip' : ''}">
                    ${i.isVip ? '<div class="vip-badge">VIP ЗАКРЕП</div>' : ''}
                    <img src="${i.img}">
                    <div class="card-info">
                        <span class="server-tag">${i.server}</span>
                        <h3 style="margin:10px 0 5px 0">${i.title}</h3>
                        <div style="font-size:12px; color:#888">${i.cat}</div>
                        <div class="price">${Number(i.price).toLocaleString()} руб. ${i.type === 'rent' ? '<small>/час</small>' : ''}</div>
                        <button class="btn btn-red" style="width:100%" onclick="window.open('https://t.me/${i.tg}')">Написать продавцу</button>
                        
                        ${(isAdmin || isOwner) ? `
                            <div class="admin-controls">
                                <button class="btn" style="background:#444; font-size:10px" onclick="app.deleteItem(${i.id})">Удалить</button>
                                ${isAdmin ? `HTML
